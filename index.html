*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f172a;color:#e2e8f0;font-family:system-ui,-apple-system,sans-serif;min-height:100vh}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:#334155;border-radius:4px}
#app{max-width:860px;margin:0 auto;padding:16px}
.card{background:#1e293b;border-radius:12px;padding:16px;margin-bottom:14px}
.card-title{font-size:13px;font-weight:700;margin-bottom:12px;color:#f1f5f9}
.label{font-size:11px;color:#64748b;margin-bottom:4px}
.tabs{display:flex;gap:5px;margin-bottom:14px;flex-wrap:wrap}
.tab{background:#1e293b;color:#94a3b8;border:none;border-radius:20px;padding:5px 14px;
     font-size:12px;font-weight:600;cursor:pointer;text-transform:capitalize}
.tab.active{background:#fc4c02;color:#fff}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-bottom:16px}
.kpi{background:#1e293b;border-radius:12px;padding:12px 10px}
.kpi-val{font-size:20px;font-weight:700;color:#f8fafc}
.kpi-sub{font-size:11px;color:#475569;margin-top:2px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;margin-bottom:14px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.mini-card{background:#1e293b;border-radius:12px;padding:14px}
.chart-wrap{position:relative;width:100%;margin:8px 0}
.run-row{display:flex;align-items:center;padding:9px 0;border-top:1px solid #0f172a;cursor:pointer}
.run-row:first-child{border-top:none}
.run-dot{width:7px;height:7px;border-radius:50%;background:#fc4c02;margin-right:9px;flex-shrink:0}
.run-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.run-date{font-size:11px;color:#64748b}
.run-km{font-size:13px;font-weight:600;text-align:right}
.run-pace{font-size:11px;color:#64748b;text-align:right}
.run-arrow{color:#475569;font-size:18px;margin-left:6px;flex-shrink:0}
.week-table{width:100%;border-collapse:collapse;font-size:12px}
.week-table th{color:#64748b;font-weight:600;padding:5px 8px;text-align:left}
.week-table td{padding:7px 8px;border-top:1px solid #0f172a}
.zone-row{display:flex;align-items:center;gap:12px}
.zone-bar-v{width:10px;border-radius:4px;flex-shrink:0}
.legend{display:flex;gap:14px;margin-top:8px;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:4px;font-size:11px;color:#94a3b8}
.legend-dot{width:8px;height:8px;border-radius:2px;display:inline-block}
.milestone-row{display:flex;align-items:center;gap:12px;padding:9px 0;border-top:1px solid #0f172a}
.pr-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-top:1px solid #0f172a}
.pr-medal{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;
           justify-content:center;font-size:13px;flex-shrink:0}
.progress-wrap{background:#0f172a;border-radius:6px;height:8px;overflow:hidden;margin:4px 0}
.progress-bar{height:100%;border-radius:6px}
.ai-box{background:#1e3a2f;border:1px solid #166534;border-radius:12px;padding:16px;margin-bottom:14px}
.ai-btn{background:#fc4c02;color:#fff;border:none;border-radius:10px;padding:12px 24px;
        font-size:14px;font-weight:700;cursor:pointer;width:100%}
.ai-quick-btn{background:#166534;color:#4ade80;border:none;border-radius:8px;
              padding:8px 16px;font-size:12px;font-weight:600;cursor:pointer}
.ai-text{font-size:12px;line-height:1.8;color:#d1fae5;white-space:pre-wrap}
.ai-result{font-size:12px;line-height:1.8;color:#cbd5e1;white-space:pre-wrap}
.countdown{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.count-cell{background:#0f172a;border-radius:10px;padding:12px}
.count-val{font-size:20px;font-weight:700;margin-top:4px}
.back-btn{background:#1e293b;border:none;color:#94a3b8;border-radius:8px;
          padding:8px 14px;font-size:13px;cursor:pointer;margin-bottom:16px}
.detail-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-bottom:14px}
.detail-cell{background:#1e293b;border-radius:10px;padding:10px 12px}
.select-month{background:#1e293b;border:1px solid #334155;color:#e2e8f0;border-radius:8px;
              padding:6px 10px;font-size:13px;margin-left:auto}
select option{background:#1e293b}
.header{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.strava-icon{background:#fc4c02;border-radius:10px;padding:6px 10px;font-weight:800;font-size:18px;color:#fff}
</style>

const MN = ["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"];
const dt  = d => new Date(d + "T12:00:00");

const monthKey = d => { const x=dt(d); return `${MN[x.getMonth()]} ${String(x.getFullYear()).slice(2)}`; };
const monthSort = (a,b) => {
  const [ma,ya]=a.split(" "),[mb,yb]=b.split(" ");
  return Number(ya)!==Number(yb)?Number(ya)-Number(yb):MN.indexOf(ma)-MN.indexOf(mb);
};
const pace = (dist,secs) => {
  const v=secs/60/(dist/1000),m=Math.floor(v),s=Math.round((v-m)*60);
  return `${m}:${s.toString().padStart(2,"0")}`;
};
const paceVal = (dist,secs) => secs/60/(dist/1000);
const fmtTime = secs => { const h=Math.floor(secs/3600),m=Math.floor((secs%3600)/60); return h>0?`${h}h ${m}m`:`${m}m`; };
const fmtDate = (d,opts) => dt(d).toLocaleDateString("es-CL", opts||{day:"2-digit",month:"short"});
const h = (tag,attrs,children) => {
  const el = document.createElement(tag);
  Object.entries(attrs||{}).forEach(([k,v])=>{ if(k==="class")el.className=v; else if(k==="style")el.style.cssText=v; else if(k.startsWith("on"))el[k]=v; else el.setAttribute(k,v); });
  (children||[]).forEach(c=>{ if(typeof c==="string")el.appendChild(document.createTextNode(c)); else if(c)el.appendChild(c); });
  return el;
};
const div  = (a,c) => h("div",a,c);

/* ═══════════════════════════════════════════════════════════

═══════════════════════════════════════════════════════════ */
function computeWeekly(allRuns) {
  const map={};
  allRuns.forEach(r=>{
    const x=dt(r.date),day=x.getDay()||7;
    const mon=new Date(x); mon.setDate(x.getDate()-day+1);
    const key=mon.toISOString().slice(0,10);
    if(!map[key]) map[key]={week:key,km:0,runs:0,cals:0,effort:0};
    map[key].km+=r.dist/1000; map[key].runs++; map[key].cals+=r.cals; map[key].effort+=r.effort;
  });
  return Object.values(map).sort((a,b)=>a.week.localeCompare(b.week))
    .map(w=>({...w,km:Math.round(w.km*10)/10,
      label:dt(w.week).toLocaleDateString("es-CL",{day:"2-digit",month:"short"})}));
}
function computeMonthly(allRuns) {
  const map={};
  allRuns.forEach(r=>{const k=monthKey(r.date); map[k]=(map[k]||0)+r.dist/1000;});
  return Object.keys(map).sort(monthSort).map(k=>({month:k,km:Math.round(map[k])}));
}
function computeZones(filtered) {
  const t=[0,0,0,0,0];
  filtered.forEach(r=>{const z=effortToZones(r.effort,r.dist); z.forEach((v,i)=>t[i]+=r.moving*v);});
  const total=t.reduce((a,b)=>a+b,0)||1;
  return t.map((v,i)=>({name:ZONE_LABELS[i],pct:Math.round(v/total*100),mins:Math.round(v/60),color:ZONE_COLORS[i]}));
}

const weeklyData  = computeWeekly(runs);
const monthlyData = computeMonthly(runs);
const normalRuns  = runs.filter(r=>r.dist>5000&&r.dist<35000);
const paceData    = normalRuns.slice(0,30).reverse();

function getFiltered() {
  return STATE.selMonth==="all"?runs:runs.filter(r=>monthKey(r.date)===STATE.selMonth);
}
function getKPIs(filtered) {
  const totDist=filtered.reduce((a,r)=>a+r.dist,0);
  const totMov =filtered.reduce((a,r)=>a+r.moving,0);
  return {
    totalKm:   Math.round(filtered.reduce((a,r)=>a+r.dist/1000,0)),
    totalCals: filtered.reduce((a,r)=>a+r.cals,0).toLocaleString("es-CL"),
    totalRuns: filtered.length,
    avgPace:   totDist>0?pace(totDist,totMov):"–",
  };
}
function getGlobalStats() {
  const bestWeek = weeklyData.length?weeklyData.reduce((a,b)=>b.km>a.km?b:a):null;
  const totalPRs = runs.reduce((a,r)=>a+r.prs,0);
  const maxDist  = runs.length?Math.max(...runs.map(r=>r.dist)):0;
  const f10 = normalRuns.slice(-10).reduce((a,r)=>a+paceVal(r.dist,r.moving),0)/Math.max(normalRuns.slice(-10).length,1);
  const l10 = normalRuns.slice(0,10).reduce((a,r) =>a+paceVal(r.dist,r.moving),0)/Math.max(normalRuns.slice(0,10).length,1);
  const paceImp = f10>0?((f10-l10)/f10*100).toFixed(1):"0";
  return {bestWeek,totalPRs,maxDist,paceImp};
}

/* ═══════════════════════════════════════════════════════════
   API CLAUDE
═══════════════════════════════════════════════════════════ */
async function callClaude(prompt) {
  const res = await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,
      messages:[{role:"user",content:prompt}]})
  });
  const data=await res.json();
  if(data.error) throw new Error(data.error.message);
  return (data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("\n");
}

  ].forEach(cat=>{
    const card=div({class:"card"});
    const header=div({style:"display:flex;align-items:center;gap:8px;margin-bottom:12px"});
    header.appendChild(span({style:"font-size:18px"},[cat.icon]));
    const ht=div({});
    ht.appendChild(div({style:"font-size:14px;font-weight:700"},[cat.label]));
    ht.appendChild(div({style:"font-size:11px;color:#64748b"},[`Próxima meta: ${cat.target}`]));
    header.appendChild(ht);
    card.appendChild(header);

    PRS[cat.key].forEach((r,i)=>{
      const row=div({class:"pr-row",style:i===0?"border-top:none":""});
      const medal=div({class:"pr-medal",style:`background:${i===0?cat.color:"#334155"}`});
      medal.appendChild(document.createTextNode(i===0?"🥇":i===1?"🥈":"🥉"));
      row.appendChild(medal);
      const info=div({style:"flex:1"});
      info.appendChild(div({style:"font-size:13px;font-weight:600"},[r.race]));
      info.appendChild(div({style:"font-size:11px;color:#64748b"},[`${r.date} · ${r.note}`]));
      row.appendChild(info);
      row.appendChild(div({style:`font-size:17px;font-weight:800;color:${i===0?cat.color:"#94a3b8"}`},[r.time]));
      card.appendChild(row);
    });

    // Progress bars
    if(cat.key==="marathon") {
      const pw=div({style:"margin-top:12px"});
      const lab=div({style:"display:flex;justify-content:space-between;font-size:11px;color:#64748b;margin-bottom:4px"});
      lab.appendChild(span({},[" Progreso hacia sub-3:05"]));
      lab.appendChild(span({},["3:10:46 → 3:05:00"]));
      pw.appendChild(lab);
      const bar=div({class:"progress-wrap"});
      bar.appendChild(div({class:"progress-bar",style:"background:#fc4c02;width:60%"}));
      pw.appendChild(bar);
      pw.appendChild(div({style:"font-size:10px;color:#475569;margin-top:3px"},["Faltan ~5m 46s · Buenos Aires sep 2026"]));
      card.appendChild(pw);
    }
    if(cat.key==="ten") {
      const pw=div({style:"margin-top:12px"});
      const lab=div({style:"display:flex;justify-content:space-between;font-size:11px;color:#64748b;margin-bottom:4px"});
      lab.appendChild(span({},[" Progreso hacia sub-40:00"]));
      lab.appendChild(span({},["40:33 → 39:59"]));
      pw.appendChild(lab);
      const bar=div({class:"progress-wrap"});
      bar.appendChild(div({class:"progress-bar",style:"background:#fbbf24;width:82%"}));
      pw.appendChild(bar);
      pw.appendChild(div({style:"font-size:10px;color:#475569;margin-top:3px"},["Faltan ~34 seg"]));
      card.appendChild(pw);
    }
    parent.appendChild(card);
  });
}

/* ═══════════════════════════════════════════════════════════
   MAIN & DETAIL
═══════════════════════════════════════════════════════════ */
function renderMain(app) {
  renderHeader(app);
  renderQuickAI(app);
  renderTabs(app);
  renderKPIs(app);
  const content=div({});
  app.appendChild(content);
  if(STATE.tab==="resumen")        renderResumen(content);
  if(STATE.tab==="cumplimiento")   renderCumplimiento(content);
  if(STATE.tab==="zonas fc")       renderZonas(content);
  if(STATE.tab==="progresión")     renderProgresion(content);
  if(STATE.tab==="análisis ia")    renderAnalisisIA(content);
  if(STATE.tab==="mejores tiempos")renderMejoresTiempos(content);
}

function renderDetail(app) {
  const r=STATE.selRun;
  const back=btn({class:"back-btn",onclick:()=>{STATE.selRun=null;render();}},"← Volver");
  app.appendChild(back);
  app.appendChild(h("div",{style:"font-weight:700;font-size:18px;margin-bottom:4px"},[r.name]));
  app.appendChild(h("div",{style:"font-size:12px;color:#64748b;margin-bottom:16px"},
    [dt(r.date).toLocaleDateString("es-CL",{weekday:"long",day:"numeric",month:"long",year:"numeric"})]));

  const grid=div({class:"detail-grid"});
  [
    {label:"Distancia",val:`${Math.round(r.dist/100)/10} km`,color:"#fc4c02"},
    {label:"Pace",     val:`${pace(r.dist,r.moving)} /km`,   color:"#34d399"},
    {label:"Tiempo",   val:fmtTime(r.moving),                color:"#60a5fa"},
    {label:"Desnivel", val:`${r.elev} m`,                    color:"#fbbf24"},
    {label:"Cadencia", val:`${r.cadence||"–"} spm`,          color:"#a78bfa"},
    {label:"Esfuerzo", val:String(r.effort),                 color:"#f97316"},
    {label:"Calorías", val:`${r.cals} kcal`,                 color:"#f472b6"},
    {label:"PRs",      val:String(r.prs),                    color:"#34d399"},
  ].forEach(k=>{
    const c=div({class:"detail-cell"});
    c.appendChild(div({style:"font-size:10px;color:#64748b;margin-bottom:3px"},[k.label]));
    c.appendChild(div({style:`font-size:17px;font-weight:700;color:${k.color}`},[k.val]));
    grid.appendChild(c);
  });
  app.appendChild(grid);

  // AI por carrera
  const aiCard=div({class:"card"});
  aiCard.appendChild(div({class:"card-title"},["🤖 Análisis de esta salida"]));
  if(STATE.runAILoad===r.id) {
    aiCard.appendChild(div({style:"text-align:center;padding:24px;color:#64748b;font-size:13px"},["⏳ Analizando…"]));
  } else if(STATE.runAI[r.id]) {
    aiCard.appendChild(div({style:"font-size:13px;line-height:1.8;color:#cbd5e1;white-space:pre-wrap"},[STATE.runAI[r.id]]));
  } else {
    const b=btn({class:"ai-btn",onclick:async()=>{
      STATE.runAILoad=r.id; render();
      const {avgPace}=getKPIs(getFiltered());
      try {
        const txt=await callClaude(
          `Eres entrenador de running. Analiza este entrenamiento en 4-5 líneas, en español, sin tuteos, solo datos y análisis:\n`+
          `Actividad: ${r.name} | Fecha: ${r.date} | Distancia: ${Math.round(r.dist/100)/10}km | Pace: ${pace(r.dist,r.moving)}/km\n`+
          `Desnivel: ${r.elev}m | Cadencia: ${r.cadence} spm | Esfuerzo: ${r.effort} | Calorías: ${r.cals}\n`+
          `Contexto: atleta meta sub-3:05 Buenos Aires (20 sep 2026), pace promedio general ${avgPace}/km.`
        );
        STATE.runAI[r.id]=txt;
      } catch(e){ STATE.runAI[r.id]="Error: "+e.message; }
      STATE.runAILoad=null; render();
    }},["Analizar esta salida"]);
    aiCard.appendChild(b);
  }
  app.appendChild(aiCard);
}

/* ─── INIT ─── */
render();
</script>
</body>
</html>
